services:
  polymarket-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      STARTING_CASH: "50"
      COPY_NOTIONAL_USD: "1"
      MAX_SLIPPAGE: "0.01"
      RELATIVE_SLIPPAGE_RATE: "0.02"
      POLL_INTERVAL_SECONDS: "1"
      HEARTBEAT_SECONDS: "30"
      RECENT_TRADE_LIMIT: "30"
      ENABLE_CLOUDFLARE_TUNNEL: "1"
    volumes:
      - polymarket-data:/app/data
    restart: unless-stopped

  options-collector:
    build: .
    command:
      - python
      - scripts/collect_updown_5m.py
      - --write-csv
      - --asset
      - ethereum
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - polymarket-data:/app/data
    restart: unless-stopped

volumes:
  polymarket-data:
